name: Apply keyword parser status label once

on:
  push:
    paths:
      - ".github/workflows/apply-keyword-status-label.yml"
      - "tools/patch_keyword_status_label.py"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-label-patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch status label
        run: python tools/patch_keyword_status_label.py

      - name: Check patched label
        run: grep -q "keyword-aware PDF table extraction" index.html

      - name: Commit label patch and remove temporary runner
        run: |
          git config user.name "openband-bot"
          git config user.email "openband-bot@users.noreply.github.com"
          rm -f .github/workflows/apply-keyword-status-label.yml tools/patch_keyword_status_label.py
          git add -A index.html .github/workflows/apply-keyword-status-label.yml tools/patch_keyword_status_label.py
          if git diff --cached --quiet; then
            echo "No label changes to commit"
          else
            git commit -m "Label keyword-aware parser output"
            git push
          fi
