name: Repair role-label sanitized data

on:
  push:
    paths:
      - .github/workflows/repair-role-label-data.yml
      - tools/sanitize_data.py
  workflow_dispatch:

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild data from pre-regression snapshot
        run: |
          git show 9a1e4c2:data.json > data.json
          python tools/sanitize_data.py data.json
          python tools/audit_data.py > audit-results.txt

      - name: Verify parser quality scan
        run: |
          python - <<'PY'
          import json
          import re
          from collections import Counter

          with open('data.json', encoding='utf-8') as f:
              data = json.load(f)

          payment_keys = ['remuneration', 'travel', 'expenses', 'creditCard', 'otherPayments']

          def is_remuneration(filing):
              return 'remuneration' in (filing.get('docType') or '').lower()

          def value(raw):
              return raw if isinstance(raw, (int, float)) else 0

          def nearly_equal(left, right):
              return bool(left and right and abs(left - right) <= max(2, abs(right) * 0.02))

          issues = []
          big_river_years = {}
          for band in data.get('bands', []):
              for filing in band.get('filings', []):
                  if not is_remuneration(filing):
                      continue
                  people = filing.get('people') or []
                  if band.get('name') == 'Big River First Nation':
                      big_river_years[filing.get('year')] = len(people)
                  for person in people:
                      total = value(person.get('total')) or sum(value(person.get(key)) for key in payment_keys)
                      remuneration = value(person.get('remuneration'))
                      travel = value(person.get('travel'))
                      expenses = value(person.get('expenses'))
                      name = person.get('name') or ''
                      if any(0 < abs(value(person.get(key))) <= 24 for key in ['travel', 'expenses', 'creditCard', 'otherPayments']) and total > 30000:
                          issues.append(('small_component', band.get('name'), filing.get('year'), name))
                      if 0 < remuneration <= 24 and total > 1000:
                          issues.append(('month_in_remuneration', band.get('name'), filing.get('year'), name))
                      if nearly_equal(expenses, remuneration + travel) and total > expenses + 10000:
                          issues.append(('expenses_echo_subtotal', band.get('name'), filing.get('year'), name))
                      if re.search(r'\b(director|manager|finance|post\s+secondary|lands|education|coordinator|administrator|employee)\b', name, re.I):
                          issues.append(('staff_title_name', band.get('name'), filing.get('year'), name))
                      if re.search(r'(^|\b)(council\s+member|council|councillor|councilor)\b', name, re.I):
                          issues.append(('role_word_in_name', band.get('name'), filing.get('year'), name))

          if issues:
              print(Counter(issue[0] for issue in issues))
              for issue in issues[:80]:
                  print(issue)
              raise SystemExit('High-risk parser patterns remain')

          expected_big_river = {
              '2014-2015', '2015-2016', '2016-2017', '2017-2018', '2019-2020',
              '2020-2021', '2021-2022', '2022-2023', '2023-2024', '2024-2025'
          }
          missing = sorted(year for year in expected_big_river if big_river_years.get(year, 0) == 0)
          if missing:
              print(big_river_years)
              raise SystemExit(f'Big River parsed rows missing after repair: {missing}')

          print('Quality scan passed')
          print('Big River years:', big_river_years)
          PY

      - name: Remove temporary workflow
        run: rm -f .github/workflows/repair-role-label-data.yml

      - name: Commit repaired data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json audit-results.txt .github/workflows/repair-role-label-data.yml
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git commit -m "Repair role-label parsed data"
            git push
          fi
