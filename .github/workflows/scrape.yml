name: Scrape FNFTA data

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: openband-v2-scraper
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Preserve current data snapshot
        run: cp data.json data.before.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanitize previous snapshot
        run: python tools/sanitize_data.py data.before.json

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser reliability tests
        run: python -m unittest tests/test_parser_quality.py

      - name: Run scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          OPENBAND_PARSE_YEARS: "2024-2025"
          OPENBAND_MAX_PDF_ATTEMPTS: "80"
        run: python run_scraper_v2.py

      - name: Preserve previous parsed rows
        run: python tools/merge_previous_data.py data.before.json data.json

      - name: Apply manual overrides
        run: python tools/apply_manual_overrides.py data.json

      - name: Sanitize parsed rows
        run: python tools/sanitize_data.py data.json

      - name: Validate data did not regress
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          before = json.loads(Path('data.before.json').read_text(encoding='utf-8'))
          after = json.loads(Path('data.json').read_text(encoding='utf-8'))

          def parsed_count(data):
              count = 0
              for band in data.get('bands', []):
                  for filing in band.get('filings', []):
                      if 'remuneration' in filing.get('docType', '').lower() and filing.get('people'):
                          count += 1
              return count

          before_bands = before.get('band_count') or len(before.get('bands', []))
          after_bands = after.get('band_count') or len(after.get('bands', []))
          before_parsed = parsed_count(before)
          after_parsed = parsed_count(after)
          after_errors = after.get('error_count', 0)

          print(f'bands: {before_bands} -> {after_bands}')
          print(f'parsed filings: {before_parsed} -> {after_parsed}')
          print(f'errors: {after_errors}')

          if after_bands < max(60, before_bands - 2):
              raise SystemExit('Refusing to commit: band count dropped too far')
          if after_errors > 5:
              raise SystemExit('Refusing to commit: too many scraper errors')
          if before_parsed >= 10 and after_parsed < before_parsed:
              raise SystemExit('Refusing to commit: parsed filing count regressed')
          PY

      - name: Audit current data
        run: |
          python tools/audit_data.py
          python tools/manual_review_report.py

      - name: Remove validation snapshot
        run: rm -f data.before.json

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update FNFTA data"
          file_pattern: data.json manual-review-report.json
