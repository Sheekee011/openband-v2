name: Simplify data status once

on:
  push:
    paths:
      - ".github/workflows/simplify-data-status.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simplify-status:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Simplify Data Status panel
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          html = html.replace(
              ".status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}",
              ".status-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}",
              1,
          )

          old_block = '''<section class="status-band" id="status"><div><h2>Data Status</h2><p id="auditSummary">Loading current coverage and parser status...</p><div class="status-foot">OpenBand is a public-interest index of official filings. Automated rows should be checked against the linked ISC PDF before publication.</div></div><div class="status-grid"><div class="status-item"><div class="status-k">Parsed</div><div class="status-v" id="auditParsed">-</div></div><div class="status-item"><div class="status-k">Pending</div><div class="status-v" id="auditPending">-</div></div><div class="status-item"><div class="status-k">Missing SK names</div><div class="status-v" id="auditMissing">-</div></div></div></section>'''
          new_block = '''<section class="status-band" id="status"><div><h2>Data Status</h2><p id="auditSummary">Loading current coverage...</p><div class="status-foot">OpenBand is a public-interest index of official filings. Rows should be checked against the linked ISC PDF before publication.</div></div><div class="status-grid"><div class="status-item"><div class="status-k">Parsed filings</div><div class="status-v" id="auditParsed">-</div></div><div class="status-item"><div class="status-k">Bands tracked</div><div class="status-v" id="auditBands">-</div></div><div class="status-item"><div class="status-k">Updated</div><div class="status-v" id="auditUpdated">-</div></div></div></section>'''
          if old_block not in html:
              raise SystemExit('Could not find status panel block')
          html = html.replace(old_block, new_block, 1)

          old_js = """function parseAudit(text){const pick=re=>{const m=text.match(re);return m?m[1]:'-'};return{generated:pick(/generated:\\s*(.+)/),bands:pick(/bands:\\s*(\\d+)/),parsed:pick(/parsed remuneration filings:\\s*(\\d+)/),pending:pick(/posted remuneration filings still pending:\\s*(\\d+)/),missing:pick(/expected SK names missing:\\s*(\\d+)/)}}\nasync function loadAudit(){try{const r=await fetch('audit-results.txt',{cache:'no-store'});if(!r.ok)throw Error('audit missing');const a=parseAudit(await r.text());auditParsed.textContent=a.parsed;auditPending.textContent=a.pending;auditMissing.textContent=a.missing;auditSummary.textContent=`Current audit tracks ${a.bands} Saskatchewan First Nations, with ${a.parsed} parsed remuneration filings and ${a.pending} posted filings still waiting for clean extraction.`}catch(e){auditSummary.textContent='Audit report is not available yet. The site will still load data.json when search is used.'}}"""
          new_js = """function parseAudit(text){const pick=re=>{const m=text.match(re);return m?m[1]:'-'};return{generated:pick(/generated:\\s*(.+)/),bands:pick(/bands:\\s*(\\d+)/),parsed:pick(/parsed remuneration filings:\\s*(\\d+)/)}}\nasync function loadAudit(){try{const r=await fetch('audit-results.txt',{cache:'no-store'});if(!r.ok)throw Error('audit missing');const a=parseAudit(await r.text());auditParsed.textContent=a.parsed;auditBands.textContent=a.bands;auditUpdated.textContent=timeAgo(a.generated);auditSummary.textContent=`OpenBand currently tracks ${a.bands} Saskatchewan First Nations with ${a.parsed} parsed remuneration filings available for search and comparison.`}catch(e){auditSummary.textContent='OpenBand is ready to search once the latest data file loads.'}}"""
          if old_js not in html:
              raise SystemExit('Could not find audit JS block')
          html = html.replace(old_js, new_js, 1)

          path.write_text(html, encoding='utf-8')
          PY

      - name: Commit status cleanup
        run: |
          git config user.name "openband-bot"
          git config user.email "openband-bot@users.noreply.github.com"
          rm -f .github/workflows/simplify-data-status.yml
          git add index.html
          git add -u .github/workflows/simplify-data-status.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Simplify Data Status panel"
            git push
          fi
