name: Remove public roadmap link

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/remove-public-roadmap-link.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Remove public roadmap link
        run: |
          python - <<'PY'
          from pathlib import Path

          index = Path('index.html')
          text = index.read_text(encoding='utf-8')
          text = text.replace('<a href="roadmap.html">Roadmap</a>', '')
          index.write_text(text, encoding='utf-8')

          workflow = Path('.github/workflows/remove-public-roadmap-link.yml')
          if workflow.exists():
              workflow.unlink()
          PY
      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .github/workflows/remove-public-roadmap-link.yml
          if git diff --cached --quiet; then
            echo "No cleanup needed."
            exit 0
          fi
          git commit -m "Remove public roadmap link from homepage"
          git push
