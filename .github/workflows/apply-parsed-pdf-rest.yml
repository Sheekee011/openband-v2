                          row("Peequaqaut, Charlene", "Councillor", 12, 48204, 10205, 0, 1850, 60259),
                          row("Squirrel, Eric", "Councillor", 12, 48204, 8023, 0, 9650, 65877),
                      ],
                  },
              },
          ]

          def normalize(name):
              return re.sub(r"[^a-z0-9]+", "", name.lower().replace("&", "and"))

          def direct_pdf_url(band_id, year):
              params = urllib.parse.urlencode(
                  {"BAND_NUMBER_FF": band_id, "FY": year, "DOC": "Schedule of Remuneration and Expenses", "lang": "eng"},
                  quote_via=urllib.parse.quote,
              )
              return f"https://fnp-ppn.aadnc-aandc.gc.ca/fnp/Main/Search/DisplayBinaryData.aspx?{params}"

          def find_band(data, override):
              candidates = [override["band"]] + override.get("aliases", [])
              by_norm = {normalize(b.get("name", "")): b for b in data.get("bands", [])}
              for candidate in candidates:
                  found = by_norm.get(normalize(candidate))
                  if found:
                      return found
              if override.get("id"):
                  band = {
                      "id": override["id"],
                      "name": override["band"],
                      "province": "SK",
                      "filings": [],
                      "status": "manual_added",
                  }
                  data.setdefault("bands", []).append(band)
                  return band
              raise SystemExit(f"Band not found: {override['band']}")

          def find_or_create_filing(band, year):
              for filing in band.get("filings", []):
                  if filing.get("year") == year and "remuneration" in filing.get("docType", "").lower():
                      return filing
              filing = {
                  "year": year,
                  "docType": "Schedule of Remuneration and Expenses",
                  "date": "Manual screenshot",
                  "href": direct_pdf_url(band.get("id"), year) if band.get("id") else None,
                  "posted": True,
                  "fallback": True,
              }
              band.setdefault("filings", []).append(filing)
              return filing

          data_path = Path("data.json")
          data = json.loads(data_path.read_text(encoding="utf-8"))
          audit_payload = {"source": SOURCE, "status": STATUS, "overrides": []}
          applied = 0

          for override in overrides:
              band = find_band(data, override)
              saved = {"band": band.get("name"), "requestedBand": override["band"], "filings": {}}
              for year, people in override["filings"].items():
                  filing = find_or_create_filing(band, year)
                  filing["people"] = people
                  filing["posted"] = True
                  filing["parse_status"] = STATUS
                  if not filing.get("href") and band.get("id"):
                      filing["href"] = direct_pdf_url(band.get("id"), year)
                  warnings = filing.get("warnings") or []
                  note = "Manual transcription from user-provided PARSED.pdf screenshots; verify against ISC source PDF before publication"
                  if note not in warnings:
                      warnings.append(note)
                  filing["warnings"] = warnings
                  saved["filings"][year] = people
                  applied += 1
              audit_payload["overrides"].append(saved)

          data["band_count"] = len(data.get("bands", []))
          Path("manual_overrides").mkdir(exist_ok=True)
          Path("manual_overrides/parsed_pdf_batch_2.json").write_text(json.dumps(audit_payload, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          data_path.write_text(json.dumps(data, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"applied manual filings: {applied}")
          PY

      - name: Audit updated data
        run: |
          python tools/sanitize_data.py data.json
          python tools/audit_data.py | tee audit-results.txt

      - name: Remove one-time workflow
        run: rm -f .github/workflows/apply-parsed-pdf-rest.yml

      - name: Commit manual rows
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json audit-results.txt manual_overrides/parsed_pdf_batch_2.json .github/workflows/apply-parsed-pdf-rest.yml
          git commit -m "Add remaining manual rows from parsed PDF" || echo "No changes to commit"
          git push
