name: Simplify money columns once

on:
  push:
    paths:
      - ".github/workflows/simplify-money-columns.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  simplify-money-columns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Make public money columns less brittle
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          replacements = [
              (
                  'table{width:100%;border-collapse:collapse;min-width:920px}',
                  'table{width:100%;border-collapse:collapse;min-width:720px}',
                  'reduce table width after fewer columns',
              ),
              (
                  '<div class="sc"><div class="sc-lbl">Non-salary payments</div><div class="sc-val" id="sExp">-</div><div class="sc-sub">Travel, expenses, other</div></div>',
                  '<div class="sc"><div class="sc-lbl">Expenses &amp; other</div><div class="sc-val" id="sExp">-</div><div class="sc-sub">Non-remuneration payments</div></div>',
                  'rename summary bucket',
              ),
              (
                  '<table><thead><tr><th>Name</th><th>Role</th><th>Months</th><th>Remuneration</th><th>Travel</th><th>Expenses</th><th>Credit Card</th><th>Other</th><th>Total</th></tr></thead><tbody id="tb"></tbody></table>',
                  '<table><thead><tr><th>Name</th><th>Role</th><th>Months</th><th>Remuneration</th><th>Expenses &amp; other</th><th>Total</th></tr></thead><tbody id="tb"></tbody></table>',
                  'combine table money columns',
              ),
              (
                  "tb.innerHTML='<tr><td colspan=\"9\" style=\"text-align:center;color:var(--muted)\">No rows match this filter.</td></tr>';",
                  "tb.innerHTML='<tr><td colspan=\"6\" style=\"text-align:center;color:var(--muted)\">No rows match this filter.</td></tr>';",
                  'fix empty-row colspan',
              ),
              (
                  '<td class=\"amt\">${money(p.remuneration)}</td><td class=\"amt\">${money(p.travel)}</td><td class=\"amt\">${money(p.expenses)}</td><td class=\"amt\">${money(p.creditCard)}</td><td class=\"amt\">${money(p.otherPayments)}</td><td class=\"amtt\">${fmt(rowTotal(p))}</td>',
                  '<td class=\"amt\">${money(p.remuneration)}</td><td class=\"amt\">${money(rowExtra(p))}</td><td class=\"amtt\">${fmt(rowTotal(p))}</td>',
                  'render combined expenses bucket',
              ),
              (
                  "const header=['band','fiscal_year','name','role','months','remuneration','travel','expenses','credit_card','other_payments','total','source_url'];const body=rows.map(p=>[curName,curYear,p.name,p.role,p.months||'',num(p.remuneration),num(p.travel),num(p.expenses),num(p.creditCard),num(p.otherPayments),rowTotal(p),filing.href||ISC_FILING(bandMap[curName].id)].map(csvEscape).join(','));",
                  "const header=['band','fiscal_year','name','role','months','remuneration','expenses_and_other','total','source_url'];const body=rows.map(p=>[curName,curYear,p.name,p.role,p.months||'',num(p.remuneration),rowExtra(p),rowTotal(p),filing.href||ISC_FILING(bandMap[curName].id)].map(csvEscape).join(','));",
                  'make CSV match public display',
              ),
              (
                  "function renderNote(filing,band){srcNote.innerHTML=`<strong>Source:</strong> Parsed from the Schedule of Remuneration and Expenses filed with ISC under the FNFTA using ${methodName(filing.parse_status)}. <strong>Verification:</strong> check figures against the original filing before publication. <a href=\"${filing.href||ISC_FILING(band.id)}\" target=\"_blank\" rel=\"noopener\">View original PDF</a>.`}",
                  "function renderNote(filing,band){srcNote.innerHTML=`<strong>Source:</strong> Parsed from the Schedule of Remuneration and Expenses filed with ISC under the FNFTA using ${methodName(filing.parse_status)}. <strong>Note:</strong> source PDFs use different column labels, so OpenBand groups non-remuneration amounts as expenses &amp; other. <strong>Verification:</strong> check figures against the original filing before publication. <a href=\"${filing.href||ISC_FILING(band.id)}\" target=\"_blank\" rel=\"noopener\">View original PDF</a>.`}",
                  'explain combined bucket in source note',
              ),
          ]

          changed = []
          for old, new, label in replacements:
              if old in html:
                  html = html.replace(old, new, 1)
                  changed.append(label)
              elif new in html:
                  changed.append(label + ' already applied')
              else:
                  raise SystemExit(f'Could not find pattern for: {label}')

          Path('money-column-update.txt').write_text('\n'.join(changed) + '\n', encoding='utf-8')
          path.write_text(html, encoding='utf-8')
          print('\n'.join(changed))
          PY

      - name: Commit money column update
        run: |
          git config user.name "openband-bot"
          git config user.email "openband-bot@users.noreply.github.com"
          rm -f .github/workflows/simplify-money-columns.yml
          git add index.html money-column-update.txt
          git add -u .github/workflows/simplify-money-columns.yml
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Simplify public money columns"
            git push
          fi
