name: Audit OpenBand data

on:
  workflow_dispatch:
  pull_request:
    paths:
      - data.json
      - tools/audit_data.py
      - scraper.py
      - run_scraper.py
      - run_scraper_v2.py

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run data audit
        run: python tools/audit_data.py
