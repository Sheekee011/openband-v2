name: Backfill Community Capital data

on:
  workflow_dispatch:
    inputs:
      years:
        description: "Comma-separated fiscal years"
        required: true
        default: "2024-2025,2023-2024,2022-2023"
      max_filings:
        description: "Maximum audited statements to parse (0 means all matching filings)"
        required: true
        default: "30"
      use_openai:
        description: "Use OpenAI fallback for statements needing manual review"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: openband-v2-data-writers
  cancel-in-progress: false

jobs:
  capital-backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Preserve current capital data
        run: cp capital-data.json capital-data.before.json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run parser tests
        run: python -m unittest discover -s tests -v

      - name: Confirm OpenAI API access and quota
        if: ${{ inputs.use_openai }}
        continue-on-error: true
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_PREFLIGHT_MODEL: gpt-4.1-mini
        run: python tools/check_openai_access.py

      - name: Parse audited financial statements
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1
          CAPITAL_YEARS: ${{ inputs.years }}
          CAPITAL_LIMIT: ${{ inputs.max_filings }}
          USE_OPENAI: ${{ inputs.use_openai }}
        run: |
          set -euo pipefail
          IFS=',' read -ra YEARS <<< "$CAPITAL_YEARS"
          COMMON_ARGS=(--limit "$CAPITAL_LIMIT" --report capital-extraction-report.json)
          if [ "$USE_OPENAI" = "true" ]; then
            COMMON_ARGS+=(--use-openai)
          fi
          for YEAR in "${YEARS[@]}"; do
            YEAR="$(echo "$YEAR" | xargs)"
            [ -z "$YEAR" ] && continue
            echo "::group::Community Capital $YEAR"
            python tools/capital_parser.py "${COMMON_ARGS[@]}" --year "$YEAR"
            echo "::endgroup::"
          done

      - name: Validate capital data did not regress
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from tools.capital_parser import validate_summary

          before = json.loads(Path("capital-data.before.json").read_text(encoding="utf-8"))
          after = json.loads(Path("capital-data.json").read_text(encoding="utf-8"))

          def parsed_count(data):
              return sum(
                  1
                  for band in data.get("bands", {}).values()
                  for summary in band.get("years", {}).values()
                  if summary.get("parseStatus") == "parsed"
                  and summary.get("publishable") is not False
              )

          before_count = parsed_count(before)
          after_count = parsed_count(after)
          print(f"parsed capital summaries: {before_count} -> {after_count}")
          if after.get("schemaVersion") != 1:
              raise SystemExit("Refusing to commit: unsupported capital schema")

          invalid = []
          for band_id, band in after.get("bands", {}).items():
              for fiscal_year, summary in band.get("years", {}).items():
                  if (
                      summary.get("parseStatus") != "parsed"
                      or summary.get("publishable") is False
                  ):
                      continue
                  validation = validate_summary(summary)
                  if validation.get("parseStatus") != "parsed":
                      invalid.append(
                          f"{band_id} {band.get('name')} {fiscal_year}: "
                          + "; ".join(validation.get("warnings") or [])
                      )
          if invalid:
              raise SystemExit(
                  "Refusing to commit invalid publishable capital summaries:\n"
                  + "\n".join(invalid)
              )
          PY

      - name: Run parser tests against generated capital data
        run: python -m unittest discover -s tests -v

      - name: Remove validation snapshot
        run: rm -f capital-data.before.json

      - name: Commit Community Capital data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Backfill Community Capital data"
          file_pattern: capital-data.json capital-extraction-report.json
